<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário para entrada de dados</title>
</head>
<body>
    <div class="pageHeader">
        <h1>Entrada de credenciais do aluno</h1>
    </div>
    <div class="formularioBody">
        <form action="#" method="#">
            <label for="nomeAluno">Nome do aluno:</label><br>
            <input type="text" id="nomeAluno" name="nomeAluno" required><br><br>
            <label for="matricula">Matricula</label><br>
            <input type="text" id="matricula" name="matricula" required><br><br>
            <label for="emailAluno">E-mail do aluno:</label><br>
            <input type="email" id="emailAluno" name="emailAluno" required><br><br>
            <input type="date" id="dataNascimento" name="dataNascimento"><br><br>
            <label for="foneAluno">Telefone do aluno:</label><br>
            <input type="tel" id="foneAluno" name="foneAluno"><br><br>
            <label for="nomeCurso">Curso:</label>
            <select name="nomeCurso" id="nomeCurso">
                <option value="curso">Desenvolvimento de sistemas</option>
                <option value="curso">Manutenção de computadores</option>
                <option value="curso">Manutenção de redes</option>
                <option value="curso">Internet das coisas</option>
            </select><br><br>
            <label for="turnoAulas">Turno:</label>
            <input type="checkbox" id="turnoAulas" name="turnoAulas" value="matutino"> Matutino
            <input type="checkbox" id="turnoAulas" name="turnoAulas" value="vespertino"> Vespertino
            <input type="checkbox" id="turnoAulas" name="turnoAulas" value="noturno"> Noturno<br><br>
            <label for="comentarios">Comentários:</label><br>
            <textarea name="comentarios" id="comentarios"></textarea><br><br>
            <input type="submit" value="Enviar" style="background-color: black; color: white;">
            <input type="reset" value="Limpar">
        </form>
    </div>
</body>
</html>
