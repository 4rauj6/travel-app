<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compre seu carro</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="container1">
        <h1>Carros e bicicletas.</h1>
        <p>Encontre as melhores ofertas aqui.</p>
    </div>
    
    <div class="container2">
        <h1>Carros disponíveis:</h1>
        <div class="container3">
            <img src="https://image.webmotors.com.br/_fotos/anunciousados/gigante/2026/202603/20260314/chevrolet-cruze-1-8-lt-16v-flex-4p-automatico-wmimagem04301923665.webp?s=fill&w=1920&h=1440&q=75" class="containerImg">
            <h2>Chevrolet Cruze LT (seminovo) - <strong class="price">R$ 60.000,00</strong>.</h2>
            <div class="containerDisc">
                <ul>
                    <li><strong>Modelo:</strong> Cruze (versão LT)</li>
                    <li><strong>Ano:</strong> 2013/2014</li>
                    <li><strong>Motor:</strong> 1.8L 16V FLEX</li>
                    <li><strong>Câmbio:</strong> Automático</li>
                    <li><strong>Cor:</strong> Prata</li>
                </ul>
            </div>
            <a href="https://www.webmotors.com.br/comprar/chevrolet/cruze/18-lt-16v-flex-4p-automatico/4-portas/2013-2014/66452190" class="button"> <i class="fa fa-shopping-cart"></i> Comprar aqui</a>
        </div>
    </div>
</body>

<style>
    body{
        background-color: rgb(238, 241, 245);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    li{
        list-style-type: none;
        color: rgb(255, 255, 255);
    }

    a{
        text-decoration: none;
        position: absolute;
        left: 32px;
        color: rgb(0, 0, 0);
    }

    strong{
        color: yellow;
    }

    .button{
        border-radius: 5px;
        background-color: yellow;
        width: 150px;
        height: 35px;
        padding: 7px 0px 0px 10px;
    }

    .button:hover{
        background-color: rgb(255, 255, 255);
        color: rgb(0, 0, 0);
        transition: 0.3s ease;
    }

    .container1{
        width: 40%;
        margin: 0 auto;
        text-align: center;
    }

    .containerImg{
        width: 60%;
        border-radius: 40px;
        position: relative;
        left: 20%;
    }

    .container2{
        background-color: black;
        color: white;
        width: 35%;
        height: 700px;
        border-radius: 10px;
        position: absolute;
        left: 33%;
    }

    .container2 h1, h2{
        color: rgb(255, 255, 255);
        position: relative;
        left: 30px;
    }
</style>
</html>
