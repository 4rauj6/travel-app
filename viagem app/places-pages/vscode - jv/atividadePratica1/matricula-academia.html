<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let matriculas = 2600;

        while (matriculas <= 2700) {
            const nomeAluno = prompt("Digite o nome do aluno (ou cancelar para sair):");

            if (!nomeAluno) {
                alert(`Por favor digite seu nome ou cancele a operação.`);
                break;
            }

            matriculas++;

            alert(`Bem-vindo, ${nomeAluno}! Sua matrícula é: ${matriculas}`);
        }
    </script>
</body>

</html>
