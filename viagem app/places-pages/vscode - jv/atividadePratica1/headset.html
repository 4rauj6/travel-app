<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boAt Rockerz 460</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #272C34;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 5%;
            background-color: #1a1d22;
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 80px;
        }

        .logo img {
            height: 45px;
            width: auto;
            display: block;
        }

        /* Links Centralizados no Desktop */
        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            transition: 0.4s ease;
        }

        .nav-links a {
            text-decoration: none;
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
            transition: 0.3s;
            white-space: nowrap;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ff0000;
        }

        /* Botão Hamburguer */
        .menu-toggle {
            display: none;
            cursor: pointer;
            font-size: 28px;
            background: none;
            border: none;
            color: white;
            z-index: 1100;
        }

        /* --- CONTEÚDO --- */
        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 8%;
            min-height: calc(100vh - 80px);
            flex-wrap: wrap;
            gap: 40px;
        }

        .text {
            flex: 1;
            min-width: 300px;
            z-index: 1;
        }

        .text h1 {
            color: #F7E6D3;
            font-size: clamp(2.5rem, 7vw, 5rem);
            line-height: 1.1;
        }

        .text p { font-size: 1.3rem; margin-top: 10px; color: #bbb; }
        .text .price { font-size: 2.8rem; color: #ff0000; font-weight: 700; margin: 15px 0; }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .buttons button {
            background: transparent;
            padding: 12px 28px;
            border-radius: 30px;
            border: 2px solid white;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .buttons button.buy:hover, .buttons button.moreDetails:hover {
            background: #ff0000;
            border-color: #ff0000;
            transform: translateY(-3px);
        }

        .img-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-container img {
            width: 100%;
            max-width: 550px;
            height: auto;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        /* --- RESPONSIVIDADE & SIDEBAR MOBILE --- */
        @media screen and (max-width: 950px) {
            .menu-toggle {
                display: block;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%; /* Escondido */
                height: 100vh;
                width: 280px;
                background-color: #1a1d22;
                flex-direction: column;
                justify-content: flex-start;
                align-items: flex-start;
                padding: 100px 40px;
                transform: none; /* Remove a centralização do desktop */
                box-shadow: -10px 0 30px rgba(0,0,0,0.5);
                left: auto;
            }

            .nav-links.active {
                right: 0; /* Desliza para dentro */
            }

            .nav-links li {
                width: 100%;
                margin-bottom: 20px;
            }

            .nav-links a {
                font-size: 20px;
                display: block;
                width: 100%;
                padding: 10px 0;
                border-bottom: 1px solid #333;
            }

            /* Layout Mobile: Título -> Imagem -> Botões */
            .wrapper {
                flex-direction: column;
                text-align: center;
                padding-top: 20px;
            }

            .text { order: 1; }
            .img-container { order: 2; margin: 20px 0; }
            .buttons { order: 3; justify-content: center; width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="https://images.seeklogo.com/logo-png/35/2/boat-logo-png_seeklogo-354310.png" alt="Logo">
        </div>
        
        <ul class="nav-links" id="navLinks">
            <li><a href="#" class="active">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <button class="menu-toggle" id="menuToggle">☰</button>
    </nav>

    <main class="wrapper">
        <div class="text">
            <h1>boAt Rockerz 460</h1>
            <p>Wireless Headphones</p>
            <p class="price">$199</p>
            
            <div class="buttons">
                <button class="buy">Add to cart</button>
                <button class="moreDetails">More details</button>
            </div>
        </div>

        <div class="img-container">
            <img src="https://www.pngarts.com/files/11/Headphone-PNG-High-Quality-Image.png" alt="Headset">
        </div>
    </main>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');

        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            
            // Alterna o ícone entre hambúrguer e X
            if (navLinks.classList.contains('active')) {
                menuToggle.innerHTML = '✕';
                menuToggle.style.position = 'fixed'; // Mantém o X visível sobre a sidebar
            } else {
                menuToggle.innerHTML = '☰';
                menuToggle.style.position = 'static';
            }
        });

        // Fecha a sidebar ao clicar em qualquer link
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                menuToggle.innerHTML = '☰';
                menuToggle.style.position = 'static';
            });
        });
    </script>
</body>
</html>
