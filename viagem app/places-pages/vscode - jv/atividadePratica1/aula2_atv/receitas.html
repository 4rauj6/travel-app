<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas.com</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <ul>
            <li><a href="#home" style="font-size: 1.1em;"><i class="fa fa-home" style="font-size: 1.2em;"></i> | Home.</a></li>
            <li><a href="#receita" style="font-size: 1.1em;"><i class="fa fa-cutlery" style="font-size: 1.1em;"></i> | Receitas.</a></li>
            <li><button onclick="changeTheme()" style="cursor: pointer;">Trocar Tema</button></li>
        </ul>
    </div>
    
    <div class="homepageDiv" id="home">
        <h1>receitas.com</h1>
        <p class="paragrafo">Seu ponto de encontro com a melhores receitas.</p>
    </div>
</body>

<style>
    html{
        scroll-behavior: smooth;
    }
    body{
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        transition: 0.5s ease;
        background-color: rgb(0, 0, 0);
        color: rgb(255, 255, 255);
    }

    .navbar{
        position: fixed;
    }

    .dark-mode{
        background-color: rgb(255, 255, 255);
        color: rgb(0, 0, 0);
    }

    ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
        width: 200px;
        background-color: #c0c0c0;
        border-radius: 6px;
    }

    li a{
        display: block;
        color: black;
        padding: 8px 16px;
        text-decoration: none;
        border-radius: 4px;
    }

    li a:hover {
        background-color: #00aa00;
        color: white;
    }

    .homepageDiv{
        position: absolute;
        top: 1%;
        left: 40%;
        color: #00aa00;
    }

    .paragrafo{
        position: relative;
        left: -20%;
    }
</style>

<script>
    function changeTheme() {
        var darkTheme = document.body;
        darkTheme.classList.toggle("dark-mode");
    }

    changeTheme();
</script>
</html>
