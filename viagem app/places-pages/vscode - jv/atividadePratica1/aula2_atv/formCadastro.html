<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="formCadastro.css">
</head>
<body>
    <div class="formBody"><br><br>
        <h1>Area de cadastro.</h1>
        <h3>Faça seu cadastro no sistema.</h3>
        <div class="formCss"><br>
            <form action="formLogin.html" method="get">
                <label for="username">Usuário</label><br>
                <input type="text" id="username" name="username" autocomplete="on">
                <br><br>
                <label for="password">Senha</label><br>
                <input type="password" id="password" name="password">
                <br><br>
                <label for="email">E-mail</label><br>   
                <input type="email" id="email" name="email">
                <br><br>
                <p class="pergunta">Qual linguagem de programação você mais utiliza?</p>
                <label for="checkbox">
                    <input type="checkbox" id="checkbox1" name="checkbox1" class="javascript">JavaScript <br>
                    <input type="checkbox" id="checkbox2" name="checkbox2">Python <br>
                    <input type="checkbox" id="checkbox3" name="checkbox3">Java <br>
                    <input type="checkbox" id="checkbox4" name="checkbox4">C# <br><br>
                </label>
                <input type="submit" value="Enviar" class="enviarButton">
            </form>
        </div>
    </div>
</body>
</html>
