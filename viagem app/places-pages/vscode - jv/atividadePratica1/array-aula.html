<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>

<body>
    <script>
        let carros = [];

        for (let i = 0; i < 5; i++) {
            let carro = prompt("Digite um carro:");

            if (carro && carro.trim() !== "") {
                carros.push(carro);
            } else if (!carro) {
                alert("Ouve um erro, ou nada foi digitado. Tente recarregar a pagina para tentar novamente")
            }
        }

        for (let i = 0; i < 2; i++) {

            let lista = carros.map((carro, index) => {
                return `${index + 1} - ${carro}`;
            });

            let escolhaExcluir = prompt(
                "Digite o número do carro que deseja excluir:\n\n" +
                lista.join("\n")
            );

            let indexEscolha = Number(escolhaExcluir) - 1;

            if (indexEscolha >= 0 && indexEscolha < carros.length) {
                let removido = carros.splice(indexEscolha, 1);

                alert(
                    `Carro removido: ${removido}\n\nNova lista:\n` +
                    carros.map((c, i) => `${i + 1} - ${c}`).join("\n")
                );
            } else {
                alert("ouve um erro, por favo tente novamente");
            }
        }
    </script>
</body>

</html>
