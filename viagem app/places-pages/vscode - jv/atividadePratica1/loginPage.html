<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="box">
        <div class="entrar">
            <img src="skambo3 1.svg" alt="skambo" style="width: 50%; margin-top: 20%;">
            <h1 style="font-size: 1.4em; margin-top: -2%; margin-left: 4%;">Seja bem vindo!</h1>
            <p style="margin-top: -2%; margin-left: 4%;">Acesse sua conta <br>agora mesmo</p>
            <button style="margin-top: 20%; font-size: 1.2em; font-family: 'Poppins';">Entrar</button><br><br>
            <a href="#" style="text-decoration: none; margin-top: -10%; margin-left: 15%; color: white; font-weight: 300;">Esqueci minha senha</a>
        </div>
        <br>
        <div class="login">
            <h2 style="margin-top: -2%; font-size: 2em;">Crie sua conta</h2>
            <p style="margin-top: 2%;">preencha o formulário</p>

            <form action="#">
                <label for="nome"></label>
                <input type="text" name="nome" id="nome" placeholder="Nome">
                <br>
                <label for="email"></label>
                <input type="email" name="email" id="email" placeholder="E-mail">
                <br>
                <label for="senha"></label>
                <input type="password" name="senha" placeholder="Senha">
                <br>
                <button style="margin-top: 20%; font-family: 'Poppins';">Cadastrar</button>
            </form>
        </div>
    </div>
</body>

<script>

</script>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background-color: #E2CE1A;
        display: flex; 
        justify-content: center;
        align-items: center;
        min-height: 100vh; 
        padding: 20px;
    }

    .box {
        display: flex;
        flex-direction: row;
        width: 100%;
        max-width: 900px;
        background-color: #FEFAA1;
        border-radius: 20px;
        overflow: hidden;
    }

    .entrar {
        background-color: black;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; 
        text-align: center;
        width: 30%;
        padding: 30px;
    }

    .login {
        background-color: #FEFAA1;
        color: black;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 60%;
        padding: 40px;
    }

    .login h2 { font-size: 2em; margin-bottom: 5px; }
    .login p { margin-bottom: 50px;}

    form {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    form > input {
        background-color: #E2CE1A;
        color: #000000;
        font-family: 'Poppins';
        font-weight: 600;
        font-size: 1em;
        padding: 15px;
        width: 100%;
        max-width: 320px;
        border-radius: 10px;
        border: 2px solid transparent;
        margin-bottom: 15px;
        outline: none;
    }

    form > input:focus {
        border: 2px solid black;
    }

    form > button {
        background-color: black;
        color: white;
        border: none;
        padding: 12px 40px;
        border-radius: 30px;
        font-size: 1.1em;
        margin-top: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    form > button:hover {
        background-color: #333;
        color: white;
        transition: 0.3s ease;
    }

    .entrar button {
        background-color: transparent;
        color: white;
        border: 2px solid white;
        padding: 10px 30px;
        width: 80%;
        max-width: 200px;
        border-radius: 30px;
        margin-top: 20px;
        cursor: pointer;
        transition: 0.3s;
    }

    .entrar button:hover {
        background-color: rgb(255, 255, 255);
        color: rgb(0, 0, 0);
    }

    @media(max-width: 768px){
        .box {
            flex-direction: column;
            max-width: 400px;
        }
        .entrar, .login {
            width: 100%;
        }
        .entrar { order: 2; }
        .login { order: 1; }
    }
</style>
</html>
