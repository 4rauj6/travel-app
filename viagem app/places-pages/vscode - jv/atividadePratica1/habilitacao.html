<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Agendamento de provas para habilitados.</h1>
    <form action="#" id="form"
        style="display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start;">
        <label for="nome"></label>
        <input type="text" name="nome" id="nome" placeholder="Digite seu nome completo. *">
        <label for="idade"></label>
        <input type="text" name="idade" id="idade" placeholder="Digite sua idade. *">
        <button type="submit">Enviar</button>
    </form>

    <script>
        const formSide = document.getElementById("form");
        const idadeMaior = 18;

        formSide.addEventListener('submit', function (event) {

            const idadeInput = document.getElementById("idade").value;
            const nomeInput = document.getElementById("nome").value;

            if (!idadeInput || !nomeInput) {
                alert("Por favor preencha todos o campos para continuar.");
                return;
            }

            if (idadeInput < idadeMaior) {
                alert("Você deve ter pelo menos 18 anos para prosseguir.");
            } else {
                alert("Sua prova foi agentdada com sucesso!");
            }
        })
    </script>
</body>

</html>
