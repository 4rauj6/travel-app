<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>viagens.com</title>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#porque-nos-escolher">Por que nos escolher</a></li>
            <li><a href="#locais-para-conhecer">Locais para conhecer</a></li>
        </ul>
    </nav>

    <section class="mainPage">
        <div class="boxText">
            <h1>Viajar nunca foi tão fácil!</h1>
            <p>Aproveite os melhores preços na hora da sua viagem!</p>
        </div>
    </section>

    <div class="searchBox">
        <input type="text" placeholder="Procure por um destino...">
    </div>


    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(231, 231, 231)
        }

        .navbar{
            background-color: rgb(255, 255, 255);
            padding: 14px;
            position: sticky;
            top: 0;
        }

        .navbar ul{
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 40px;
            list-style: none;
        }

        .navbar a{
            text-decoration: none;
            color: rgb(0, 0, 0);
        }

        .navbar a:hover{
            font-weight: 500;
            transition: 0.2s ease-in-out;
        }

        .searchBox{
            display: flex;
            justify-content: flex-start;
            align-content: center;
            padding: 0 5%;
        }

        .searchBox input, ::placeholder{
            background-color: white;
            color: orange;
            padding: 10px 400px 10px 10px;
            border-radius: 10px;
        }

        .boxText {
            display: flex;
            flex-direction: column;    
            justify-content: center;   
            align-items: flex-start;       
            height: 17vh;         
            padding: 0 5%;
        }

        .boxText h1 {
            margin: 0;                 
            font-size: 2rem;    
        }

        .boxText p {
            margin: 15px 0 0 0;        
        }
    </style>
</body>
</html>
